name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Commit message
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}"
          else
            pnpm commitlint --last
          fi
      - name: Prepare WXT
        run: pnpm wxt prepare
      - name: Typecheck
        run: pnpm typecheck
      - name: Biome
        run: pnpm check
      - name: Unit and component tests
        run: pnpm test
      - name: Browser-level tests
        run: pnpm test:e2e
      - name: Build Chrome package
        run: pnpm build
      - name: Build Firefox package
        run: pnpm build:firefox
