name: Feature Request
description: Propose a new capability or product improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Focus on the user problem first. Implementation details are helpful after the goal is clear.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or workflow gap does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What should Wisdom do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider?
  - type: dropdown
    id: area
    attributes:
      label: Product Area
      options:
        - New Tab
        - Focus Mode
        - Blocked Page
        - Options
        - Quotes
        - Wallpapers
        - Browser Support
        - Developer Tooling
        - Other
    validations:
      required: true
  - type: textarea
    id: success
    attributes:
      label: Success Criteria
      description: How will we know this is done?
      placeholder: |
        - Users can...
        - The extension still...
        - Tests cover...
    validations:
      required: true
