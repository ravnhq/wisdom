name: Bug Report
description: Report a reproducible problem in Wisdom.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Clear reproduction details help us fix it faster.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Focus Mode redirects a site even when it is turned off.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps To Reproduce
      description: Include exact steps, URLs, settings, and browser state.
      placeholder: |
        1. Install the extension
        2. Turn Focus Mode on
        3. Open youtube.com
        4. See...
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Edge
        - Brave
        - Arc
        - Firefox
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Extension Version Or Commit
      placeholder: "0.1.0 or commit SHA"
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Add screenshots, screen recordings, logs, or console errors if available.
